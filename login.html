<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login Restaurante</title>
    <style>
        body { font-family: Arial; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 10px; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #e67e22; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Ingreso Personal</h2>
        <form action="validar_ingreso.php" method="POST">
            <input type="text" name="usuario" placeholder="Nombre de Empleado" required>
            <input type="password" name="codigo" placeholder="Código de Acceso" required>
            <button type="submit">ENTRAR</button>
        </form>
    </div>
</body>
</html>
